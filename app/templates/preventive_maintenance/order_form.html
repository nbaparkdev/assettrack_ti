{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-8 fade-in">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 border-b-2 border-black pb-4">
        <div>
            <h1 class="text-3xl font-bold text-black uppercase tracking-tighter leading-none">NOVA_ORDEM_DE_SERVICO</h1>
            <p class="font-mono text-xs text-gray-500 mt-1 uppercase tracking-widest">Preencha os detalhes da manutenção preventiva ou corretiva</p>
        </div>
    </div>

    <form action="/manutencao-preventiva/ordens/nova" method="POST" class="space-y-6">
        <div class="bg-white border-2 border-black p-8 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] space-y-6">
            
            <!-- Seleção de Plano de Manutenção e Equipamento -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold uppercase tracking-widest text-black">Plano de Manutenção (Opcional)</label>
                    <select name="plan_id"
                        class="w-full border-2 border-black rounded-none px-4 py-3 focus:ring-0 focus:border-brand-500 font-mono text-sm uppercase">
                        <option value="">Ordem Avulsa (Sem Plano)</option>
                        {% for plan in plans %}
                        <option value="{{ plan.id }}">{{ plan.codigo }} - {{ plan.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold uppercase tracking-widest text-black">Equipamento</label>
                    <select name="asset_id" required
                        class="w-full border-2 border-black rounded-none px-4 py-3 focus:ring-0 focus:border-brand-500 font-mono text-sm uppercase">
                        <option value="">Selecione o Equipamento</option>
                        {% for asset in assets %}
                        <option value="{{ asset.id }}">{{ asset.e_patrimonio }} - {{ asset.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Tipo e Prioridade -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold uppercase tracking-widest text-black">Tipo de Manutenção</label>
                    <select name="tipo" required
                        class="w-full border-2 border-black rounded-none px-4 py-3 focus:ring-0 focus:border-brand-500 font-mono text-sm uppercase">
                        {% for mt in maintenance_types %}
                        <option value="{{ mt }}">{{ mt }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold uppercase tracking-widest text-black">Prioridade</label>
                    <select name="prioridade" required
                        class="w-full border-2 border-black rounded-none px-4 py-3 focus:ring-0 focus:border-brand-500 font-mono text-sm uppercase">
                        {% for mp in maintenance_priorities %}
                        <option value="{{ mp }}">{{ mp }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Data Agendada -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="block text-xs font-bold uppercase tracking-widest text-black">Data Agendada</label>
                    <input type="datetime-local" name="data_agendada"
                        class="w-full border-2 border-black rounded-none px-4 py-3 focus:ring-0 focus:border-brand-500 font-mono text-sm">
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold uppercase tracking-widest text-black">Técnico Responsável</label>
                    <select name="tecnico_id"
                        class="w-full border-2 border-black rounded-none px-4 py-3 focus:ring-0 focus:border-brand-500 font-mono text-sm uppercase">
                        <option value="">Não atribuído</option>
                        {% for tech in technicians %}
                        <option value="{{ tech.id }}">{{ tech.nome }} ({{ tech.role }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Descrição -->
            <div class="space-y-2">
                <label class="block text-xs font-bold uppercase tracking-widest text-black">Descrição da Manutenção</label>
                <textarea name="descricao" rows="6" required
                    placeholder="Descreva detalhadamente o trabalho a ser realizado..."
                    class="w-full border-2 border-black rounded-none px-4 py-3 focus:ring-0 focus:border-brand-500 font-mono text-sm"></textarea>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center justify-end gap-4">
            <a href="/manutencao-preventiva/ordens" class="font-bold text-xs uppercase tracking-widest text-gray-500 hover:text-black transition">
                Cancelar
            </a>
            <button type="submit"
                class="bg-black text-white px-10 py-4 rounded-none text-sm font-bold uppercase tracking-widest hover:bg-gray-800 transition shadow-[4px_4px_0px_0px_rgba(0,0,0,0.2)] hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,0.2)]">
                Criar Ordem
            </button>
        </div>
    </form>
</div>
{% endblock %}
