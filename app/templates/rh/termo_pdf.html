<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Termo de Responsabilidade - {{ termo.usuario.nome }}</title>
    <style>
        @page {
            size: A4;
            margin: 3cm 2.5cm 2.5cm 2.5cm;
            @top-right {
                content: "Ref: Patrimônio {{ termo.asset.e_patrimonio }}";
                font-family: 'Courier New', Courier, monospace;
                font-size: 8pt;
                color: #777777;
            }
            @bottom-center {
                content: "Página 1 de 1";
                font-family: Arial, sans-serif;
                font-size: 9pt;
                color: #555555;
            }
        }
        
        body {
            font-family: Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.6;
            color: #111111;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2.5cm;
            border-bottom: 2px solid #000000;
            padding-bottom: 10px;
        }
        
        .header h1 {
            font-size: 16pt;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-weight: bold;
        }
        
        .header .subtitle {
            font-family: 'Courier New', Courier, monospace;
            font-size: 9pt;
            color: #666666;
            margin-top: 5px;
        }
        
        .content {
            text-align: justify;
            white-space: pre-line; /* preserves formatting of the database text */
            margin-bottom: 2cm;
        }
        
        .footer-info {
            margin-top: 3cm;
            font-size: 9pt;
            color: #777777;
            font-family: 'Courier New', Courier, monospace;
            border-top: 1px dashed #cccccc;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Termo de Responsabilidade</h1>
        <div class="subtitle">ASSETTRACK // CONTROLE INTERNO DE ATIVOS DE TI</div>
    </div>

    <div class="content">
        {{ formatted_content|safe }}
    </div>

    <div class="footer-info">
        Documento gerado eletronicamente em {{ generated_at }} pelo módulo RH Audit Workflow.
        Identificador do Termo: #{{ termo.id }}
    </div>

</body>
</html>
