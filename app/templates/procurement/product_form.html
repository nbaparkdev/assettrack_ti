{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-8 fade-in">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 border-b-2 border-black pb-4">
        <div>
            <h1 class="text-3xl font-bold text-black uppercase tracking-tighter leading-none">Novo Produto</h1>
            <p class="font-mono text-xs text-gray-500 mt-1 uppercase tracking-widest">Registrar novo item no catálogo de compras</p>
        </div>
        <a href="/compras/produtos" class="font-mono text-xs font-bold bg-white border-2 border-black text-black px-4 py-2 hover:bg-gray-100 transition shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
            &larr; Cancelar
        </a>
    </div>

    {% if error %}
    <div class="bg-red-50 border-2 border-red-600 p-4 font-mono text-xs text-red-600 uppercase">
        {{ error }}
    </div>
    {% endif %}

    <!-- Form -->
    <form action="/compras/produtos/new" method="POST" class="bg-white border-2 border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label for="codigo" class="block font-mono text-[10px] font-bold uppercase text-gray-400 mb-1">Código Único (SKU/PartNumber)</label>
                <input type="text" id="codigo" name="codigo" required class="w-full bg-white border-2 border-black p-3 font-mono text-sm focus:outline-none focus:bg-gray-50 uppercase" placeholder="PROD-0001">
            </div>

            <div>
                <label for="nome" class="block font-mono text-[10px] font-bold uppercase text-gray-400 mb-1">Nome do Produto/Serviço</label>
                <input type="text" id="nome" name="nome" required class="w-full bg-white border-2 border-black p-3 text-sm focus:outline-none focus:bg-gray-50" placeholder="Ex: Teclado Mecânico USB">
            </div>

            <div>
                <div class="flex justify-between items-end mb-1">
                    <label for="categoria_id" class="block font-mono text-[10px] font-bold uppercase text-gray-400">Categoria de Compra</label>
                    <button type="button" onclick="document.getElementById('modal-categoria').classList.remove('hidden')" class="font-mono text-[10px] font-bold text-blue-600 hover:underline uppercase">+ Nova</button>
                </div>
                <select id="categoria_id" name="categoria_id" required class="w-full bg-white border-2 border-black p-3 text-sm focus:outline-none focus:bg-gray-50 font-mono">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.nome }}</option>
                    {% else %}
                    <option value="" disabled>Nenhuma categoria disponível</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <div class="flex justify-between items-end mb-1">
                    <label for="unidade" class="block font-mono text-[10px] font-bold uppercase text-gray-400">Unidade de Medida</label>
                    <button type="button" onclick="document.getElementById('modal-unidade').classList.remove('hidden')" class="font-mono text-[10px] font-bold text-blue-600 hover:underline uppercase">+ Nova</button>
                </div>
                <select id="unidade" name="unidade" required class="w-full bg-white border-2 border-black p-3 text-sm focus:outline-none focus:bg-gray-50 font-mono">
                    {% for u in units %}
                    <option value="{{ u.sigla }}">{{ u.sigla }} - {{ u.descricao or '' }}</option>
                    {% else %}
                    <option value="UN">UN - Unidade</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="tipo" class="block font-mono text-[10px] font-bold uppercase text-gray-400 mb-1">Tipo de Produto</label>
                <select id="tipo" name="tipo" required class="w-full bg-white border-2 border-black p-3 text-sm focus:outline-none focus:bg-gray-50 font-mono">
                    <option value="Equipamento">Equipamento (Ativo Imobilizado)</option>
                    <option value="Material de Consumo">Material de Consumo (Almoxarifado)</option>
                    <option value="Serviço">Serviço</option>
                </select>
            </div>

            <div>
                <label for="marca" class="block font-mono text-[10px] font-bold uppercase text-gray-400 mb-1">Marca</label>
                <input type="text" id="marca" name="marca" class="w-full bg-white border-2 border-black p-3 text-sm focus:outline-none focus:bg-gray-50" placeholder="Ex: Dell, Logitech">
            </div>

            <div>
                <label for="modelo" class="block font-mono text-[10px] font-bold uppercase text-gray-400 mb-1">Modelo</label>
                <input type="text" id="modelo" name="modelo" class="w-full bg-white border-2 border-black p-3 text-sm focus:outline-none focus:bg-gray-50" placeholder="Ex: MX Keys">
            </div>

            <div>
                <label for="fabricante" class="block font-mono text-[10px] font-bold uppercase text-gray-400 mb-1">Fabricante</label>
                <input type="text" id="fabricante" name="fabricante" class="w-full bg-white border-2 border-black p-3 text-sm focus:outline-none focus:bg-gray-50" placeholder="Ex: Dell Inc.">
            </div>
        </div>

        <div>
            <label for="descricao" class="block font-mono text-[10px] font-bold uppercase text-gray-400 mb-1">Descrição Detalhada / Observações técnicas</label>
            <textarea id="descricao" name="descricao" rows="4" class="w-full bg-white border-2 border-black p-3 text-sm focus:outline-none focus:bg-gray-50" placeholder="Insira especificações técnicas necessárias para o comprador..."></textarea>
        </div>

        <button type="submit" class="w-full bg-black text-white font-mono text-xs font-bold py-4 uppercase tracking-wider hover:bg-white hover:text-black hover:border-black transition border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px]">
            CADASTRAR PRODUTO
        </button>
    </form>
</div>

<!-- Modal Categoria -->
<div id="modal-categoria" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white border-2 border-black p-6 w-full max-w-md shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
        <h3 class="font-bold text-lg uppercase mb-4">Nova Categoria de Compra</h3>
        <form id="form-categoria" onsubmit="salvarCategoria(event)" class="space-y-4">
            <div>
                <label class="block font-mono text-[10px] font-bold uppercase text-gray-500 mb-1">Nome da Categoria *</label>
                <input type="text" name="nome" required class="w-full border-2 border-black p-2 text-sm focus:outline-none">
            </div>
            <div class="flex gap-4 mt-6">
                <button type="button" onclick="document.getElementById('modal-categoria').classList.add('hidden')" class="flex-1 font-mono text-xs font-bold border-2 border-black px-4 py-2 hover:bg-gray-100 transition">Cancelar</button>
                <button type="submit" class="flex-1 bg-black text-white font-mono text-xs font-bold px-4 py-2 hover:bg-gray-800 transition">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Unidade -->
<div id="modal-unidade" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white border-2 border-black p-6 w-full max-w-md shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
        <h3 class="font-bold text-lg uppercase mb-4">Nova Unidade de Medida</h3>
        <form id="form-unidade" onsubmit="salvarUnidade(event)" class="space-y-4">
            <div>
                <label class="block font-mono text-[10px] font-bold uppercase text-gray-500 mb-1">Sigla * (Ex: KG, L, ROLO)</label>
                <input type="text" name="sigla" required maxlength="20" class="w-full border-2 border-black p-2 text-sm focus:outline-none uppercase">
            </div>
            <div>
                <label class="block font-mono text-[10px] font-bold uppercase text-gray-500 mb-1">Descrição</label>
                <input type="text" name="descricao" class="w-full border-2 border-black p-2 text-sm focus:outline-none">
            </div>
            <div class="flex gap-4 mt-6">
                <button type="button" onclick="document.getElementById('modal-unidade').classList.add('hidden')" class="flex-1 font-mono text-xs font-bold border-2 border-black px-4 py-2 hover:bg-gray-100 transition">Cancelar</button>
                <button type="submit" class="flex-1 bg-black text-white font-mono text-xs font-bold px-4 py-2 hover:bg-gray-800 transition">Salvar</button>
            </div>
        </form>
    </div>
</div>

<script>
async function salvarCategoria(e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    
    try {
        const res = await fetch('/compras/api/categorias', { method: 'POST', body: formData });
        const data = await res.json();
        
        if (data.success) {
            const select = document.getElementById('categoria_id');
            const option = new Option(data.nome, data.id, true, true);
            select.add(option);
            document.getElementById('modal-categoria').classList.add('hidden');
            form.reset();
        } else {
            alert('Erro: ' + data.error);
        }
    } catch (err) {
        alert('Erro ao salvar categoria');
    }
}

async function salvarUnidade(e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    
    try {
        const res = await fetch('/compras/api/unidades', { method: 'POST', body: formData });
        const data = await res.json();
        
        if (data.success) {
            const select = document.getElementById('unidade');
            const option = new Option(data.sigla + ' - ' + (data.descricao || ''), data.sigla, true, true);
            select.add(option);
            document.getElementById('modal-unidade').classList.add('hidden');
            form.reset();
        } else {
            alert('Erro: ' + data.error);
        }
    } catch (err) {
        alert('Erro ao salvar unidade');
    }
}
</script>
{% endblock %}
