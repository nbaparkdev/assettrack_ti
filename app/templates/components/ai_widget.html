<!-- ai_widget.html -->
<div id="ai-chat-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end" data-user-name="{{ user.nome if user else 'usuário' }}" data-user-role="{{ user.role.value if user and user.role else 'usuario_comum' }}">
    <!-- Chat Window (Hidden by default) -->
    <div id="ai-chat-window" class="hidden w-80 sm:w-96 bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] mb-4 flex flex-col overflow-hidden transition-all transform origin-bottom-right">
        <!-- Header -->
        <div class="bg-black text-white p-3 flex justify-between items-center cursor-pointer" id="ai-chat-header">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <span class="font-bold uppercase tracking-wider text-sm">AssetTrack AI</span>
            </div>
            <button id="ai-chat-close-btn" class="hover:text-red-400 focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Messages Area -->
        <div id="ai-chat-messages" class="h-80 overflow-y-auto p-4 bg-gray-50 flex flex-col gap-3 font-sans text-sm">
            <!-- Initial Greeting -->
            <div class="flex items-start gap-2">
                <div class="w-8 h-8 rounded-full bg-black flex items-center justify-center text-white flex-shrink-0 border-2 border-black">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <div class="bg-white border-2 border-black p-2 rounded-br-lg rounded-bl-none rounded-t-lg max-w-[85%] shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                    Olá! Sou o Assistente IA. Como posso ajudar com seus ativos ou chamados hoje?
                </div>
            </div>
        </div>

        <!-- Typing Indicator (Hidden) -->
        <div id="ai-chat-typing" class="hidden px-4 pb-2 bg-gray-50 flex items-center gap-2 text-xs font-mono text-gray-500">
            <span class="animate-bounce">.</span><span class="animate-bounce" style="animation-delay: 0.1s">.</span><span class="animate-bounce" style="animation-delay: 0.2s">.</span>
        </div>

        <!-- Input Area -->
        <div class="border-t-4 border-black p-3 bg-white flex gap-2">
            <input type="text" id="ai-chat-input" placeholder="Digite sua mensagem..." 
                class="flex-1 border-2 border-black p-2 focus:outline-none focus:ring-0 focus:border-black font-sans text-sm transition-shadow focus:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"
                autocomplete="off">
            <button id="ai-chat-send-btn" class="bg-black text-white p-2 border-2 border-black hover:bg-white hover:text-black transition-colors focus:outline-none">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Bubble Button -->
    <div class="relative flex items-center justify-center">
        <!-- Ping Animation Layer -->
        <div class="absolute w-14 h-14 bg-indigo-500 rounded-full animate-ping opacity-60"></div>
        
        <!-- Button -->
        <button id="ai-chat-bubble" class="relative z-10 w-14 h-14 bg-yellow-400 rounded-full text-black flex items-center justify-center border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all focus:outline-none hover:bg-black hover:text-white">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
            </svg>
        </button>
    </div>
</div>

<!-- AI Chat Logic -->
<script src="/static/js/ai_chat.js"></script>
